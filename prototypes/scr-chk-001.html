<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Alling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB', 'primary-hover': '#1D4ED8', secondary: '#64748B', accent: '#F59E0B', success: '#10B981', warning: '#F59E0B', danger: '#EF4444', background: '#FFFFFF', foreground: '#0F172A', muted: '#F1F5F9', border: '#E2E8F0',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-muted min-h-screen flex flex-col font-sans">
    
    <!-- Minimal Header for Checkout -->
    <header class="bg-white border-b border-border shadow-sm py-4">
        <div class="container mx-auto px-4 flex justify-between items-center max-w-5xl">
            <a href="index.html" class="text-2xl font-bold text-primary tracking-tight">Alling</a>
            <div class="flex items-center gap-2 text-sm text-secondary font-medium">
                <svg class="w-5 h-5 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                Checkout Seguro
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-1 max-w-5xl flex flex-col md:flex-row gap-8">
        
        <!-- Formularios (Izquierda) -->
        <div class="w-full md:w-2/3 space-y-6">
            
            <!-- Paso 1: Identificación -->
            <!-- CMP-CHK-001 Form Contacto -->
            <section class="bg-background rounded-xl p-6 shadow-sm border border-border relative">
                <div class="absolute -left-3 top-6 w-6 h-6 rounded-full bg-success text-white flex items-center justify-center text-xs font-bold border-2 border-white shadow">✓</div>
                <h2 class="text-lg font-bold text-foreground mb-4">1. Datos de Contacto</h2>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-secondary mb-1">Correo Electrónico *</label>
                        <input type="email" value="cliente@empresa.com" class="w-full border border-border rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary focus:border-primary outline-none" readonly>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-secondary mb-1">Teléfono Móvil *</label>
                        <input type="tel" value="987654321" class="w-full border border-border rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                    </div>
                </div>
            </section>

            <!-- Paso 2: Facturación (Documento) -->
            <!-- CMP-CHK-002 Form Documento -->
            <section class="bg-background rounded-xl p-6 shadow-sm border border-border relative border-primary">
                <div class="absolute -left-3 top-6 w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold border-2 border-white shadow">2</div>
                <h2 class="text-lg font-bold text-foreground mb-4">2. Documento de Compra</h2>
                
                <div class="flex gap-6 mb-4 border-b border-border pb-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="docType" class="text-primary focus:ring-primary">
                        <span class="font-medium">Boleta (DNI)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="docType" checked class="text-primary focus:ring-primary">
                        <span class="font-medium">Factura (RUC)</span>
                    </label>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-secondary mb-1">RUC *</label>
                        <div class="flex gap-2">
                            <input type="text" placeholder="20123456789" class="w-full border border-border rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary outline-none">
                            <button class="bg-muted hover:bg-gray-200 text-secondary font-bold px-3 rounded-lg border border-border text-sm">Validar</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-secondary mb-1">Razón Social *</label>
                        <input type="text" placeholder="Empresa S.A.C." class="w-full border border-border rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary outline-none bg-muted" readonly>
                    </div>
                </div>
            </section>

            <!-- Paso 3: Envío -->
            <!-- CMP-CHK-003, 004 Form Dirección y Envío -->
            <section class="bg-background rounded-xl p-6 shadow-sm border border-border relative opacity-60">
                <div class="absolute -left-3 top-6 w-6 h-6 rounded-full bg-gray-300 text-white flex items-center justify-center text-xs font-bold border-2 border-white shadow">3</div>
                <h2 class="text-lg font-bold text-foreground mb-4">3. Método de Envío</h2>
                
                <div class="space-y-3">
                    <label class="block p-4 border border-border rounded-lg cursor-pointer hover:bg-gray-50 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="shipping" disabled>
                            <div>
                                <p class="font-bold text-foreground">Recojo en Tienda (Lima)</p>
                                <p class="text-sm text-secondary">Gratis. Disponible hoy.</p>
                            </div>
                        </div>
                        <span class="font-bold text-success">S/ 0.00</span>
                    </label>
                    <label class="block p-4 border border-border rounded-lg cursor-pointer hover:bg-gray-50 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="shipping" disabled>
                            <div>
                                <p class="font-bold text-foreground">Envío a Domicilio</p>
                                <p class="text-sm text-secondary">Requiere dirección.</p>
                            </div>
                        </div>
                        <span class="font-bold text-foreground text-sm">Calcular</span>
                    </label>
                </div>
            </section>

        </div>

        <!-- Resumen (Derecha) -->
        <!-- CMP-CHK-005 Resumen -->
        <div class="w-full md:w-1/3">
            <div class="bg-background rounded-xl border border-border shadow-sm p-6 sticky top-24">
                <h3 class="font-bold text-lg text-foreground mb-4">Resumen de tu Pedido</h3>
                
                <!-- Lista mini de items -->
                <div class="space-y-3 mb-4 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                    <div class="flex justify-between items-start text-sm">
                        <div class="flex gap-2">
                            <div class="w-6 h-6 bg-gray-100 rounded border border-border text-xs flex justify-center items-center font-bold">2</div>
                            <span class="text-foreground line-clamp-2">Cable UTP Cat6 305m</span>
                        </div>
                        <span class="font-medium shrink-0">S/ 900.00</span>
                    </div>
                    <div class="flex justify-between items-start text-sm">
                        <div class="flex gap-2">
                            <div class="w-6 h-6 bg-gray-100 rounded border border-border text-xs flex justify-center items-center font-bold">10</div>
                            <span class="text-foreground line-clamp-2">Patch Cord Cat6 1m</span>
                        </div>
                        <span class="font-medium shrink-0">S/ 129.00</span>
                    </div>
                </div>

                <div class="border-t border-border pt-4 space-y-2 text-sm mb-6">
                    <div class="flex justify-between text-secondary">
                        <span>Subtotal</span>
                        <span>S/ 872.03</span>
                    </div>
                    <div class="flex justify-between text-secondary">
                        <span>IGV (18%)</span>
                        <span>S/ 156.97</span>
                    </div>
                    <div class="flex justify-between text-secondary">
                        <span>Envío</span>
                        <span>S/ 0.00</span>
                    </div>
                    <div class="flex justify-between pt-3 border-t border-border mt-2 text-xl font-bold text-foreground">
                        <span>Total</span>
                        <span class="text-primary">S/ 1,029.00</span>
                    </div>
                </div>

                <!-- BTN-CHK-001 Pagar -->
                <button class="w-full bg-accent hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-lg transition text-lg flex justify-center items-center gap-2 mb-3 shadow-md" onclick="alert('Redirigiendo a Pasarela de Pago Niubiz...')">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    Pagar S/ 1,029.00
                </button>
                <div class="flex justify-center items-center gap-2 text-xs text-secondary">
                    <svg class="w-4 h-4 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    <span>Pago 100% seguro encriptado</span>
                </div>
            </div>
        </div>

    </main>
</body>
</html>
